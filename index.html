<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Pollo Loco</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Gerät drehen -->
    <div id="rotate-device">
        <h2>📱 Bitte drehe dein Gerät.</h2>
        <p>Für das beste Spielerlebnis spiele im Querformat.</p>
    </div>

    <!-- Spiel -->
    <div class="game-container">

        <!-- Canvas -->
        <div class="canvas-area">
            <canvas id="canvas" width="720" height="480"></canvas>
        </div>

        <!-- Holzrahmen -->
        <img
            src="img/9_intro_outro_screens/start/holzrahmen.png"
            class="frame"
            alt="Holzrahmen">

        <!-- Menü -->
        <div id="menu">

            <!-- Linke Navigation -->
            <div class="menu-navigation">

                <img
                    id="manual-btn"
                    class="menu-icon"
                    src="img/9_intro_outro_screens/start/benutzer_Handbuch.png"
                    alt="Benutzerhandbuch">

                <img
                    id="controls-btn"
                    class="menu-icon"
                    src="img/9_intro_outro_screens/start/steuerung.png"
                    alt="Steuerung">

                <img
                    id="about-btn"
                    class="menu-icon"
                    src="img/9_intro_outro_screens/start/über_das_Spiel.png"
                    alt="Über das Spiel">

                <img
                    id="imprint-btn"
                    class="menu-icon"
                    src="img/9_intro_outro_screens/start/impressum.png"
                    alt="Impressum">

            </div>

            <!-- Mitte -->
            <div class="menu-center">

                <img
                    id="start-btn"
                    class="menu-icon"
                    src="img/9_intro_outro_screens/start/spiel_starten.png"
                    alt="Spiel starten">

            </div>

            <!-- Rechte Seite -->
            <div class="menu-right">

                <img
                    id="music-btn"
                    class="menu-icon"
                    src="img/9_intro_outro_screens/start/Lautsprecher.png"
                    alt="Musik">

            </div>

        </div>

        <!-- Overlay -->
        <div id="overlay">

            <div class="overlay-content">

                <button id="close-btn">✖</button>

                <h2 id="overlay-title"></h2>

                <div id="overlay-body"></div>

            </div>

        </div>

    </div>

    <script src="models/drawable-object.class.js"></script>
    <script src="models/movable-object.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/level.class.js"></script>
    <script src="models/world.class.js"></script>

    <script src="js/game.js"></script>

</body>

</html>
